name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  native:
    name: Native ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            executable_suffix: ""
          - runner: macos-15
            target: aarch64-apple-darwin
            executable_suffix: ""
          - runner: macos-15-intel
            target: x86_64-apple-darwin
            executable_suffix: ""
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            executable_suffix: .exe
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: false
      - name: Install Rust target
        shell: bash
        run: rustup target add "${{ matrix.target }}"
      - name: Build server and terminal
        shell: bash
        run: cargo build --locked --release --target "${{ matrix.target }}" -p bunting-server -p bunting-tui
      - name: Package native applications
        shell: bash
        run: |
          set -euo pipefail
          tag="$GITHUB_REF_NAME"
          package="bunting-${tag}-${{ matrix.target }}"
          mkdir -p "stage/${package}/bin" "stage/${package}/config" dist
          cp "target/${{ matrix.target }}/release/bunting-server${{ matrix.executable_suffix }}" "stage/${package}/bin/"
          cp "target/${{ matrix.target }}/release/bunting-tui${{ matrix.executable_suffix }}" "stage/${package}/bin/"
          cp apps/bunting-server/config/*.json "stage/${package}/config/"
          cp README.md "stage/${package}/"
          tar -C stage -czf "dist/${package}.tar.gz" "${package}"
      - uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.target }}
          path: dist/*.tar.gz
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    needs: native
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Create checksums
        working-directory: dist
        run: sha256sum bunting-*.tar.gz > SHA256SUMS
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="$GITHUB_REF_NAME"
          printf '%s\n' \
            'Install the native server and terminal on macOS or Linux:' \
            '' \
            '```bash' \
            'curl -fsSL https://raw.githubusercontent.com/andrewkoumoudjian/bunting/main/install.sh | BUNTING_VERSION='"$tag"' sh' \
            '```' \
            '' \
            'The installer adds `bunting-server`, `bunting-tui`, and server configuration templates without overwriting existing configuration. Releases contain only locally installable native applications. Verify manual downloads with `SHA256SUMS`.' \
            '' \
            'See the repository README for server configuration and platform details.' \
            > release-notes.md
          gh release create "$tag" dist/* --verify-tag --notes-file release-notes.md --title "Bunting $tag"
