name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "feat/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust-kernel:
    name: Rust and Worker kernel
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Install pinned Rust toolchain
        run: |
          rustup show
          rustup target add wasm32-unknown-unknown

      - name: Enforce architecture dependency policy
        run: |
          test -f Cargo.lock
          grep -Fq 'orderbook-rs = { version = "=0.10.3", default-features = false }' Cargo.toml
          grep -Fq 'worker = "=0.8.5"' Cargo.toml
          grep -Fq 'getrandom = { version = "=0.3.4", features = ["wasm_js"] }' packages/orderbook/Cargo.toml
          grep -Fq 'uuid = { version = "=1.23.4", features = ["js"] }' packages/orderbook/Cargo.toml
          grep -Fq 'getrandom_backend="wasm_js"' .cargo/config.toml
          grep -Fq 'Cache::default()' packages/worker-cache/src/lib.rs
          test ! -e workers/market-run-do/AGENTS.md

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Run Clippy
        run: cargo clippy --locked --workspace --all-targets -- -D warnings

      - name: Run unit tests
        run: cargo test --locked --workspace

      - name: Verify upstream dependency
        run: cargo tree --locked -p bunting-orderbook | grep -F 'orderbook-rs v0.10.3'

      - name: Check Wasm target
        run: cargo check --locked --workspace --target wasm32-unknown-unknown
