name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "feat/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust-kernel:
    name: Rust and Worker kernel
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Install pinned Rust toolchain
        run: |
          rustup show
          rustup target add wasm32-unknown-unknown

      - name: Enforce architecture dependency policy
        run: |
          grep -Fq 'orderbook-rs = { version = "=0.10.3", default-features = false }' Cargo.toml
          grep -Fq 'worker = "=0.8.5"' Cargo.toml
          grep -Fq 'Cache::default()' crates/worker-cache/src/lib.rs
          test ! -e workers/market-run-do/AGENTS.md

      - name: Generate rustfmt patch
        run: |
          cargo fmt --all
          git diff --binary > rustfmt.patch

      - name: Upload rustfmt patch
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rustfmt-patch
          path: rustfmt.patch
          if-no-files-found: error

      - name: Check formatting
        run: git diff --exit-code

      - name: Run Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run unit tests
        run: cargo test --workspace

      - name: Verify upstream dependency
        run: cargo tree -p bunting-orderbook | grep -F 'orderbook-rs v0.10.3'

      - name: Check Wasm target
        run: cargo check --workspace --target wasm32-unknown-unknown
